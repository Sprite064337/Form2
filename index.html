<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสั่งซื้อสินค้าออนไลน์ - Papaporn Farm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: #333;
            padding: 20px 10px;
        }

        .order-container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .order-header {
            background: linear-gradient(135deg, #1a237e, #ef6c00);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .order-header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .order-header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .form-zone {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #4b5563;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #ef6c00;
        }

        .submit-btn {
            width: 100%;
            background-color: #06c755;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #05b34c;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #9ca3af;
            background: #fafafa;
            border-top: 1px solid #f3f4f6;
        }
    </style>
</head>
<body>

    <div class="order-container">
        
        <header class="order-header">
            <h1>🛒 กรอกข้อมูลเพื่อสั่งซื้อสินค้า</h1>
            <p>กรุณาโอนเงินมาที่ ธ.กสิกรไทย เลขบัญชี: 000-0-00000-0</p>
            <p style="margin-top: 5px; color: #ffeb3b; font-weight: 500;">โอนเงินเรียบร้อยแล้ว กรอกข้อมูลด้านล่างได้เลยครับ</p>
        </header>

        <div class="form-zone">
            <!-- ส่วนเลือกไข่ขนาดเล็ก -->
            <div class="form-group">
                <label for="egg_small">🥚 ไข่ขนาดเล็ก (เลือกจำนวนแผง)</label>
                <select id="egg_small">
                    <option value="ไม่รับ">-- ไม่รับไข่ขนาดเล็ก --</option>
                    <option value="1 แผง (90 บาท)">1 แผง - ราคา 90 บาท</option>
                    <option value="2 แผง (180 บาท)">2 แผง - ราคา 180 บาท</option>
                    <option value="3 แผง (270 บาท)">3 แผง - ราคา 270 บาท</option>
                    <option value="4 แผง (360 บาท)">4 แผง - ราคา 360 บาท</option>
                    <option value="5 แผง (450 บาท บริการส่งฟรี)">5 แผง - ราคา 450 บาท (บริการส่งฟรี)</option>
                </select>
            </div>

            <!-- ส่วนเลือกไข่ขนาดใหญ่ -->
            <div class="form-group">
                <label for="egg_large">🥚 ไข่ขนาดใหญ่ (เลือกจำนวนแผง)</label>
                <select id="egg_large">
                    <option value="ไม่รับ">-- ไม่รับไข่ขนาดใหญ่ --</option>
                    <option value="1 แผง (90 บาท)">1 แผง - ราคา 90 บาท</option>
                    <option value="2 แผง (180 บาท)">2 แผง - ราคา 180 บาท</option>
                    <option value="3 แผง (270 บาท)">3 แผง - ราคา 270 บาท</option>
                    <option value="4 แผง (360 บาท)">4 แผง - ราคา 360 บาท</option>
                    <option value="5 แผง (450 บาท บริการส่งฟรี)">5 แผง - ราคา 450 บาท (บริการส่งฟรี)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="name">ชื่อ-นามสกุล ผู้รับ *</label>
                <input type="text" id="name" placeholder="ชื่อ และ นามสกุล" required>
            </div>

            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์ *</label>
                <input type="tel" id="phone" placeholder="ตัวอย่าง 0812345678" required>
            </div>

            <div class="form-group">
                <label for="address">ที่อยู่จัดส่งอย่างละเอียด *</label>
                <textarea id="address" rows="4" placeholder="บ้านเลขที่ หมู่ ซอย ถนน ตำบล อำเภอ จังหวัด รหัสไปรษณีย์" required></textarea>
            </div>

            <button type="button" class="submit-btn" onclick="sendToLine()">ส่งข้อมูลสั่งซื้อเข้าไลน์ร้าน</button>
        </div>

        <footer class="footer">
            <p>© 2026 ระบบสั่งซื้อสินค้า ปลอดภัย 100%</p>
        </footer>

    </div>

    <script>
        function sendToLine() {
            // ดึงค่าจากช่องฟอร์มทั้งหมด
            const eggSmall = document.getElementById('egg_small').value;
            const eggLarge = document.getElementById('egg_large').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            // ตรวจสอบข้อมูลส่วนบุคคล
            if (!name || !phone || !address) {
                alert('กรุณากรอกข้อมูลผู้รับและที่อยู่ให้ครบถ้วนก่อนส่งนะครับ');
                return;
            }

            // ตรวจสอบว่าลูกค้าเลือกสินค้าอย่างน้อยหนึ่งอย่างหรือไม่
            if (eggSmall === "ไม่รับ" && eggLarge === "ไม่รับ") {
                alert('กรุณาเลือกรายการไข่อย่างน้อย 1 รายการก่อนส่งสั่งซื้อนะครับ');
                return;
            }

            // จัดรูปแบบข้อความรายการสินค้า
            let productSummary = "";
            if (eggSmall !== "ไม่รับ") productSummary += `\n   - ไข่ขนาดเล็ก: ${eggSmall}`;
            if (eggLarge !== "ไม่รับ") productSummary += `\n   - ไข่ขนาดใหญ่: ${eggLarge}`;

            // จัดข้อความเต็มชุดเพื่อรอคัดลอก
            const text = `สนใจสั่งซื้อสินค้าจาก Papaporn Farm ครับ\n\n📦 รายการสินค้าที่สั่ง:${productSummary}\n\n👤 ชื่อผู้รับ: ${name}\n📞 เบอร์โทร: ${phone}\n🏠 ที่อยู่จัดส่ง: ${address}\n\n(แจ้งโอนเงินเรียบร้อยแล้ว)`;
            
            // ใช้ระบบคัดลอกลงคลิปบอร์ดอัตโนมัติ
            navigator.clipboard.writeText(text).then(function() {
                alert('คัดลอกข้อมูลออเดอร์เรียบร้อยแล้ว! ระบบจะเปิดแชทไลน์ ให้คุณกด "วาง" (Paste) ในช่องแชทเพื่อส่งออเดอร์และสลิปได้เลยครับ');
                
                const lineOALink = `https://lin.ee/wMpfwPK`;
                window.open(lineOALink, '_blank');
            }).catch(function(err) {
                alert('ไม่สามารถคัดลอกอัตโนมัติได้ แต่คุณยังสามารถกดแชทเพื่อสั่งซื้อได้ครับ (กรุณาแคปหน้าจอนี้ส่งทางแชท)');
                window.open(`https://lin.ee/wMpfwPK`, '_blank');
            });
        }
    </script>

</body>
</html>
